name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20.x, 22.x, 24.x]
    name: test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm install
      - run: npm run typecheck
      - run: npm test

  interop:
    runs-on: ubuntu-latest
    name: external-tool interop (ImageMagick)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: npm install
      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick
      - name: Write metadata then verify it parses in ImageMagick
        run: |
          node examples/01-read-write.mjs
          echo "--- ImageMagick reads our XMP back ---"
          identify -verbose examples/out.webp | grep -i "Profile-xmp"
          magick examples/out.webp xmp:- | grep -q "Frisbee Dog" \
            && echo "✅ XMP round-trip verified by ImageMagick" \
            || (echo "❌ XMP not found by ImageMagick" && exit 1)
