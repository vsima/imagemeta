name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22.x, 24.x]
    name: test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm install
      - run: npm run typecheck
      - run: npm test # runs .ts directly via native type stripping (Node 22+)

  node20-compat:
    runs-on: ubuntu-latest
    name: node20 build + smoke (lowest supported runtime)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm install # `prepare` builds dist/
      - name: Import the built package and round-trip on Node 20
        run: |
          node --input-type=module -e "
          import { writeMetadata, readMetadata } from './dist/index.js';
          import { readFileSync } from 'node:fs';
          const b = new Uint8Array(readFileSync('test/fixtures/simple.webp'));
          const o = writeMetadata(b, { description: 'node20 ok', keywords: ['x'] });
          const r = readMetadata(o);
          if (r.description !== 'node20 ok') { console.error('FAIL', r); process.exit(1); }
          console.log('node20 round-trip OK');
          "

  interop:
    runs-on: ubuntu-latest
    name: external-tool interop (exiftool)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: npm install
      - name: Install exiftool
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl
      - name: WebP — write metadata, verify exiftool reads it back
        run: |
          node examples/01-read-write.mjs
          exiftool examples/out.webp
          exiftool examples/out.webp | grep -q "Frisbee Dog" \
            && echo "✅ WebP XMP round-trip verified by exiftool" \
            || (echo "❌ WebP XMP not found by exiftool" && exit 1)
      - name: AVIF — write metadata, verify exiftool reads it back
        run: |
          node examples/05-avif.mjs
          exiftool examples/out.avif
          exiftool examples/out.avif | grep -q "Rice Terraces" \
            && echo "✅ AVIF XMP round-trip verified by exiftool" \
            || (echo "❌ AVIF XMP not found by exiftool" && exit 1)
